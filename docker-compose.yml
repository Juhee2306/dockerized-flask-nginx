version: "3.9"

services:
  app:
    image: juheel/flask-nginx-app:latest
    container_name: flask_app
    expose:
      - "5000"

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
